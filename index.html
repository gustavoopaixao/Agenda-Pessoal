<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agenda Pessoal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f0f13;
    --surface: #16161e;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #c8a96e;
    --accent2: #7c6fcd;
    --text: #e8e6f0;
    --text-muted: #7a7890;
    --danger: #e05f5f;
    --success: #5fbfa0;
    --today-bg: rgba(200,169,110,0.12);
    --today-border: #c8a96e;
    --event-colors: #7c6fcd, #5fbfa0, #e0935f, #e05f5f, #5fb3e0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: .04em;
  }
  .logo span { color: var(--text-muted); font-weight: 400; font-size: 1rem; margin-left: 8px; }

  .header-actions { display: flex; gap: 10px; }

  .btn {
    border: none; cursor: pointer; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: .875rem;
    font-weight: 500; transition: all .2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #0f0f13; padding: 9px 18px; }
  .btn-primary:hover { background: #d9bb82; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,169,110,.3); }
  .btn-ghost { background: transparent; color: var(--text-muted); padding: 9px 14px; border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .btn-sm { padding: 6px 12px; font-size: .8rem; }

  /* ── Layout ── */
  .container { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  aside {
    width: 270px; min-width: 270px; background: var(--surface);
    border-right: 1px solid var(--border); padding: 24px 20px;
    display: flex; flex-direction: column; gap: 28px; overflow-y: auto;
  }

  .mini-month h4 {
    font-family: 'Playfair Display', serif;
    font-size: .95rem; color: var(--accent); margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .mini-month h4 button {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 1rem; padding: 0 4px;
    transition: color .2s;
  }
  .mini-month h4 button:hover { color: var(--accent); }
  .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .mini-grid .day-name { text-align: center; font-size: .65rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; padding: 4px 0; }
  .mini-grid .mini-day {
    text-align: center; font-size: .78rem; padding: 4px 0;
    border-radius: 50%; cursor: pointer; transition: all .15s; line-height: 1.6;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin: auto;
  }
  .mini-grid .mini-day:hover { background: var(--surface2); }
  .mini-grid .mini-day.today { background: var(--accent); color: #0f0f13; font-weight: 700; }
  .mini-grid .mini-day.selected { background: var(--surface2); outline: 1px solid var(--accent); }
  .mini-grid .mini-day.other-month { color: var(--text-muted); opacity: .4; }
  .mini-grid .mini-day.has-event::after {
    content: ''; display: block; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent2); margin: 1px auto 0;
  }
  .mini-day.today.has-event::after { background: #0f0f13; }

  .upcoming-title {
    font-size: .75rem; text-transform: uppercase; letter-spacing: .1em;
    color: var(--text-muted); font-weight: 600; margin-bottom: 10px;
  }
  .upcoming-list { display: flex; flex-direction: column; gap: 8px; }
  .upcoming-item {
    background: var(--surface2); border-radius: 8px; padding: 10px 12px;
    border-left: 3px solid var(--accent); cursor: pointer; transition: all .2s;
  }
  .upcoming-item:hover { transform: translateX(2px); }
  .upcoming-item .up-title { font-size: .85rem; font-weight: 500; }
  .upcoming-item .up-date { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
  .upcoming-empty { font-size: .82rem; color: var(--text-muted); text-align: center; padding: 12px 0; }

  /* ── Main Calendar ── */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px; border-bottom: 1px solid var(--border);
  }
  .cal-month-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 700;
    display: flex; align-items: baseline; gap: 12px;
  }
  .cal-month-label .year { color: var(--text-muted); font-size: 1.1rem; font-weight: 400; }
  .cal-nav { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    width: 34px; height: 34px; border-radius: 7px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
    transition: all .2s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .today-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
    padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: .8rem;
    font-family: 'DM Sans', sans-serif; transition: all .2s;
  }
  .today-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Calendar Grid ── */
  .cal-grid-wrapper { flex: 1; overflow-y: auto; padding: 0; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .cal-day-name {
    text-align: center; padding: 10px 0; font-size: .72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted);
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .cal-cell {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    min-height: 110px; padding: 8px; cursor: pointer;
    transition: background .15s; position: relative;
    display: flex; flex-direction: column;
  }
  .cal-cell:hover { background: var(--surface2); }
  .cal-cell.today { background: var(--today-bg); }
  .cal-cell.today .day-num { color: var(--accent); font-weight: 700; }
  .cal-cell.other-month { opacity: .45; }
  .cal-cell.selected-day { background: rgba(124,111,205,.08); }

  .day-num {
    font-size: .85rem; font-weight: 500; width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; margin-bottom: 4px;
    flex-shrink: 0;
  }
  .cal-cell.today .day-num {
    background: var(--accent); color: #0f0f13;
  }

  .event-pill {
    border-radius: 4px; padding: 2px 7px; font-size: .72rem; font-weight: 500;
    margin-bottom: 2px; cursor: pointer; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; transition: opacity .15s;
    position: relative; z-index: 1;
  }
  .event-pill:hover { opacity: .85; filter: brightness(1.1); }
  .more-events {
    font-size: .7rem; color: var(--text-muted); padding: 1px 4px;
    cursor: pointer; margin-top: 1px;
  }
  .more-events:hover { color: var(--accent); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; width: 480px; max-width: 95vw;
    transform: translateY(20px) scale(.97); transition: transform .25s;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'Playfair Display', serif; font-size: 1.4rem;
    color: var(--accent); margin-bottom: 24px;
  }

  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px 14px;
    font-family: 'DM Sans', sans-serif; font-size: .9rem;
    transition: border-color .2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none; border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-opt {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all .2s;
  }
  .color-opt.selected, .color-opt:hover { border-color: #fff; transform: scale(1.15); }

  .modal-actions { display: flex; justify-content: space-between; margin-top: 24px; }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 9px 16px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans',sans-serif; font-size: .875rem; transition: all .2s; }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  /* ── Day Detail Modal ── */
  .day-modal .event-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px; background: var(--surface2); border-radius: 8px;
    margin-bottom: 8px; cursor: pointer; transition: all .2s;
  }
  .day-modal .event-item:hover { transform: translateX(3px); }
  .event-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .event-item-info .ev-title { font-size: .9rem; font-weight: 500; }
  .event-item-info .ev-time { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
  .event-item-info .ev-desc { font-size: .8rem; color: var(--text-muted); margin-top: 4px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    aside { display: none; }
    .cal-cell { min-height: 70px; padding: 5px; }
    .event-pill { display: none; }
    .more-events { display: block !important; font-size: .65rem; }
    header { padding: 14px 16px; }
    .cal-header { padding: 14px 16px; }
    .cal-month-label { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Agenda <span>Pessoal</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" id="exportBtn">⬇ Exportar</button>
    <button class="btn btn-primary" id="newEventBtn">+ Novo Evento</button>
  </div>
</header>

<div class="container">

  <!-- Sidebar -->
  <aside>
    <!-- Mini calendar -->
    <div class="mini-month">
      <h4>
        <span id="miniMonthLabel"></span>
        <div style="display:flex;gap:4px">
          <button id="miniPrev">‹</button>
          <button id="miniNext">›</button>
        </div>
      </h4>
      <div class="mini-grid" id="miniGrid"></div>
    </div>

    <!-- Upcoming -->
    <div>
      <div class="upcoming-title">Próximos eventos</div>
      <div class="upcoming-list" id="upcomingList"></div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="cal-header">
      <div class="cal-month-label">
        <span id="monthLabel"></span>
        <span class="year" id="yearLabel"></span>
      </div>
      <div class="cal-nav">
        <button class="nav-btn" id="prevBtn">‹</button>
        <button class="today-btn" id="todayBtn">Hoje</button>
        <button class="nav-btn" id="nextBtn">›</button>
      </div>
    </div>
    <div class="cal-grid-wrapper">
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </main>
</div>

<!-- Event Form Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Novo Evento</div>
    <div class="form-group">
      <label>Título</label>
      <input type="text" id="evTitle" placeholder="Ex: Consulta, Reunião..." />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="evDate" />
      </div>
      <div class="form-group">
        <label>Horário</label>
        <input type="time" id="evTime" />
      </div>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="evDesc" placeholder="Detalhes opcionais..."></textarea>
    </div>
    <div class="form-group">
      <label>Cor</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="modal-actions">
      <div>
        <button class="btn-danger" id="deleteBtn" style="display:none">🗑 Excluir</button>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" id="cancelBtn">Cancelar</button>
        <button class="btn btn-primary" id="saveBtn">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- Day Detail Modal -->
<div class="modal-overlay" id="dayModal">
  <div class="modal day-modal">
    <div class="modal-title" id="dayModalTitle"></div>
    <div id="dayEventsList"></div>
    <div style="margin-top:18px;display:flex;justify-content:space-between">
      <button class="btn btn-ghost btn-sm" id="closeDayModal">Fechar</button>
      <button class="btn btn-primary btn-sm" id="addFromDay">+ Adicionar</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const COLORS = ['#7c6fcd','#5fbfa0','#e0935f','#e05f5f','#5fb3e0','#c8a96e','#c4a0e8','#6fd5a0'];

let events = JSON.parse(localStorage.getItem('agenda_events') || '[]');
let today  = new Date(); today.setHours(0,0,0,0);
let current = new Date(today.getFullYear(), today.getMonth(), 1);
let mini    = new Date(current);
let editingId = null;
let selectedDayDate = null;

function saveEvents(){ localStorage.setItem('agenda_events', JSON.stringify(events)); }
function uid(){ return Math.random().toString(36).slice(2); }
function dateStr(d){ return d.toISOString().slice(0,10); }
function parseDate(s){ let [y,m,day]=s.split('-').map(Number); return new Date(y,m-1,day); }
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function formatDateLabel(dateStr){
  const d=parseDate(dateStr);
  return `${d.getDate()} de ${MONTHS[d.getMonth()]}`;
}

// ── Render Main Calendar ────────────────────────────
function renderCalendar(){
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  document.getElementById('monthLabel').textContent = MONTHS[current.getMonth()];
  document.getElementById('yearLabel').textContent  = current.getFullYear();

  DAYS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-name'; h.textContent = d;
    grid.appendChild(h);
  });

  const first = new Date(current.getFullYear(), current.getMonth(), 1);
  const last  = new Date(current.getFullYear(), current.getMonth()+1, 0);
  const startDow = first.getDay();
  const totalCells = startDow + last.getDate();
  const rows = Math.ceil(totalCells/7) * 7;

  for(let i=0; i<rows; i++){
    const d = new Date(current.getFullYear(), current.getMonth(), 1 - startDow + i);
    const ds = dateStr(d);
    const isToday = isSameDay(d, today);
    const isOther = d.getMonth() !== current.getMonth();

    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (isToday?' today':'') + (isOther?' other-month':'');
    cell.dataset.date = ds;

    const num = document.createElement('div');
    num.className = 'day-num'; num.textContent = d.getDate();
    cell.appendChild(num);

    const dayEvs = events.filter(e=>e.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const MAX=3;
    dayEvs.slice(0,MAX).forEach(ev=>{
      const pill = document.createElement('div');
      pill.className='event-pill';
      pill.style.background = ev.color+'28';
      pill.style.color = ev.color;
      pill.style.borderLeft = `2px solid ${ev.color}`;
      pill.textContent = (ev.time?ev.time.slice(0,5)+' ':'')+ev.title;
      pill.dataset.id = ev.id;
      pill.addEventListener('click', e=>{ e.stopPropagation(); openEdit(ev.id); });
      cell.appendChild(pill);
    });
    if(dayEvs.length>MAX){
      const more = document.createElement('div');
      more.className='more-events';
      more.textContent = `+${dayEvs.length-MAX} mais`;
      more.addEventListener('click', e=>{ e.stopPropagation(); openDayModal(ds); });
      cell.appendChild(more);
    }
    if(dayEvs.length>0 && dayEvs.length<=MAX){
      // add invisible more for mobile
      const mob = document.createElement('div');
      mob.className='more-events'; mob.style.display='none';
      mob.textContent=`${dayEvs.length} evento${dayEvs.length>1?'s':''}`;
      mob.addEventListener('click',e=>{e.stopPropagation();openDayModal(ds);});
      cell.appendChild(mob);
    }

    cell.addEventListener('click', ()=> openDayModal(ds));
    grid.appendChild(cell);
  }
  renderMini();
  renderUpcoming();
}

// ── Mini Calendar ────────────────────────────────
function renderMini(){
  document.getElementById('miniMonthLabel').textContent = MONTHS[mini.getMonth()]+' '+mini.getFullYear();
  const grid = document.getElementById('miniGrid');
  grid.innerHTML='';
  DAYS.forEach(d=>{ const h=document.createElement('div'); h.className='day-name'; h.textContent=d[0]; grid.appendChild(h); });
  const first=new Date(mini.getFullYear(),mini.getMonth(),1);
  const last =new Date(mini.getFullYear(),mini.getMonth()+1,0);
  const start=first.getDay(); const rows=Math.ceil((start+last.getDate())/7)*7;
  for(let i=0;i<rows;i++){
    const d=new Date(mini.getFullYear(),mini.getMonth(),1-start+i);
    const ds=dateStr(d);
    const isT=isSameDay(d,today); const isO=d.getMonth()!==mini.getMonth();
    const hasEv=events.some(e=>e.date===ds);
    const div=document.createElement('div');
    div.className='mini-day'+(isT?' today':'')+(isO?' other-month':'')+(hasEv?' has-event':'');
    div.textContent=d.getDate();
    div.addEventListener('click',()=>{ current=new Date(d.getFullYear(),d.getMonth(),1); renderCalendar(); });
    grid.appendChild(div);
  }
}

// ── Upcoming ────────────────────────────────────
function renderUpcoming(){
  const list=document.getElementById('upcomingList');
  const now=new Date(); now.setHours(0,0,0,0);
  const upcoming=events
    .filter(e=>parseDate(e.date)>=now)
    .sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''))
    .slice(0,6);
  if(!upcoming.length){ list.innerHTML='<div class="upcoming-empty">Nenhum evento futuro</div>'; return; }
  list.innerHTML='';
  upcoming.forEach(ev=>{
    const d=document.createElement('div'); d.className='upcoming-item';
    d.style.borderLeftColor=ev.color;
    d.innerHTML=`<div class="up-title">${ev.title}</div><div class="up-date">${formatDateLabel(ev.date)}${ev.time?' · '+ev.time.slice(0,5):''}</div>`;
    d.addEventListener('click',()=>openEdit(ev.id));
    list.appendChild(d);
  });
}

// ── Event Form Modal ─────────────────────────────
function openNew(dateDefault=''){
  editingId=null;
  document.getElementById('modalTitle').textContent='Novo Evento';
  document.getElementById('evTitle').value='';
  document.getElementById('evDate').value=dateDefault||dateStr(today);
  document.getElementById('evTime').value='';
  document.getElementById('evDesc').value='';
  document.getElementById('deleteBtn').style.display='none';
  selectColor(COLORS[0]);
  showModal('eventModal');
}

function openEdit(id){
  const ev=events.find(e=>e.id===id); if(!ev)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Editar Evento';
  document.getElementById('evTitle').value=ev.title;
  document.getElementById('evDate').value=ev.date;
  document.getElementById('evTime').value=ev.time||'';
  document.getElementById('evDesc').value=ev.desc||'';
  document.getElementById('deleteBtn').style.display='inline-block';
  selectColor(ev.color||COLORS[0]);
  closeModal('dayModal');
  showModal('eventModal');
}

// ── Day Detail Modal ─────────────────────────────
function openDayModal(ds){
  selectedDayDate=ds;
  const d=parseDate(ds);
  document.getElementById('dayModalTitle').textContent=`${d.getDate()} de ${MONTHS[d.getMonth()]}`;
  const dayEvs=events.filter(e=>e.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const list=document.getElementById('dayEventsList');
  if(!dayEvs.length){ list.innerHTML='<p style="color:var(--text-muted);font-size:.85rem;padding:8px 0">Sem eventos neste dia.</p>'; }
  else {
    list.innerHTML='';
    dayEvs.forEach(ev=>{
      const item=document.createElement('div'); item.className='event-item';
      item.innerHTML=`<div class="event-dot" style="background:${ev.color}"></div>
        <div class="event-item-info">
          <div class="ev-title">${ev.title}</div>
          ${ev.time?`<div class="ev-time">${ev.time.slice(0,5)}</div>`:''}
          ${ev.desc?`<div class="ev-desc">${ev.desc}</div>`:''}
        </div>`;
      item.addEventListener('click',()=>openEdit(ev.id));
      list.appendChild(item);
    });
  }
  showModal('dayModal');
}

// ── Color Picker ─────────────────────────────────
let selectedColor = COLORS[0];
function buildColorPicker(){
  const cp=document.getElementById('colorPicker');
  COLORS.forEach(c=>{
    const d=document.createElement('div'); d.className='color-opt';
    d.style.background=c; d.dataset.color=c;
    d.addEventListener('click',()=>selectColor(c));
    cp.appendChild(d);
  });
}
function selectColor(c){
  selectedColor=c;
  document.querySelectorAll('.color-opt').forEach(d=>d.classList.toggle('selected',d.dataset.color===c));
}

// ── Save / Delete ─────────────────────────────────
document.getElementById('saveBtn').addEventListener('click',()=>{
  const title=document.getElementById('evTitle').value.trim();
  const date =document.getElementById('evDate').value;
  if(!title||!date){ document.getElementById('evTitle').focus(); return; }
  if(editingId){
    const ev=events.find(e=>e.id===editingId);
    ev.title=title; ev.date=date; ev.time=document.getElementById('evTime').value;
    ev.desc=document.getElementById('evDesc').value; ev.color=selectedColor;
  } else {
    events.push({ id:uid(), title, date, time:document.getElementById('evTime').value, desc:document.getElementById('evDesc').value, color:selectedColor });
  }
  saveEvents(); closeModal('eventModal'); renderCalendar();
});

document.getElementById('deleteBtn').addEventListener('click',()=>{
  if(!editingId||!confirm('Excluir este evento?'))return;
  events=events.filter(e=>e.id!==editingId);
  saveEvents(); closeModal('eventModal'); renderCalendar();
});

// ── Export JSON ───────────────────────────────────
document.getElementById('exportBtn').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(events,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='agenda_eventos.json'; a.click();
});

// ── Modal helpers ─────────────────────────────────
function showModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

document.getElementById('newEventBtn').addEventListener('click',()=>openNew());
document.getElementById('cancelBtn').addEventListener('click',()=>closeModal('eventModal'));
document.getElementById('closeDayModal').addEventListener('click',()=>closeModal('dayModal'));
document.getElementById('addFromDay').addEventListener('click',()=>{ closeModal('dayModal'); openNew(selectedDayDate||''); });
document.getElementById('eventModal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeModal('eventModal'); });
document.getElementById('dayModal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeModal('dayModal'); });

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal('eventModal'); closeModal('dayModal'); }
  if(e.key==='n'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName))openNew();
});

// ── Nav ───────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click',()=>{ current=new Date(current.getFullYear(),current.getMonth()-1,1); renderCalendar(); });
document.getElementById('nextBtn').addEventListener('click',()=>{ current=new Date(current.getFullYear(),current.getMonth()+1,1); renderCalendar(); });
document.getElementById('todayBtn').addEventListener('click',()=>{ current=new Date(today.getFullYear(),today.getMonth(),1); renderCalendar(); });
document.getElementById('miniPrev').addEventListener('click',()=>{ mini=new Date(mini.getFullYear(),mini.getMonth()-1,1); renderMini(); });
document.getElementById('miniNext').addEventListener('click',()=>{ mini=new Date(mini.getFullYear(),mini.getMonth()+1,1); renderMini(); });

// ── Init ──────────────────────────────────────────
buildColorPicker();
renderCalendar();
</script>
</body>
</html>
